<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="application-name" content="Perfect Mission" />
    <meta name="apple-mobile-web-app-title" content="Perfect Mission" />
    <meta name="theme-color" content="#0A1628" />
    <meta name="color-scheme" content="dark light" />
    <link rel="icon" href="/favicon.svg" />
    <link rel="icon" href="/icons/icon-192.png" sizes="192x192" type="image/png" />
    <link rel="icon" href="/icons/icon-512.png" sizes="512x512" type="image/png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180" />
    <link rel="manifest" href="/site.webmanifest" />
    <script>
      const DARK_THEME_COLOR = '#0A1628';
      const LIGHT_THEME_COLOR = '#F8F6F1';

      const applyTheme = (theme) => {
        if (theme === 'light') {
          document.documentElement.setAttribute('data-theme', 'light');
        } else {
          document.documentElement.removeAttribute('data-theme');
        }

        const themeColorMeta = document.querySelector('meta[name="theme-color"]');
        themeColorMeta?.setAttribute(
          'content',
          theme === 'light' ? LIGHT_THEME_COLOR : DARK_THEME_COLOR
        );
      };

      document.documentElement.classList.add('js');
      try {
        const savedTheme = localStorage.getItem('theme');
        const prefersDark =
          savedTheme === null && window.matchMedia('(prefers-color-scheme: dark)').matches;

        if (savedTheme === 'light' || (!savedTheme && !prefersDark)) {
          applyTheme('light');
        } else {
          applyTheme('dark');
        }
      } catch {
        applyTheme('dark');
      }
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
