    <path d="M38 336L94 292L140 316L188 252L244 280L300 220L350 244V382H38Z" fill="#162438" fill-opacity=".9"/>
    <path d="M38 358L106 326L156 348L210 302L250 324L320 276L366 292V382H38Z" fill="#0c1b2e" fill-opacity=".95"/>
    <path d="M76 114C120 88 164 80 206 108S288 170 338 162" fill="none" stroke="url(#network)" stroke-linecap="round" stroke-width="4"/>
    <path d="M88 166C156 212 210 246 286 238S352 196 368 188" fill="none" stroke="#e8d48b" stroke-linecap="round" stroke-opacity=".46" stroke-width="2.5"/>
    <path d="M108 250C164 226 220 224 276 244S336 292 364 286" fill="none" stroke="#c9a84c" stroke-linecap="round" stroke-opacity=".36" stroke-width="2"/>
