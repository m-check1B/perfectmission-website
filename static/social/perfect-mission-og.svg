    <text x="246" y="126" font-family="Georgia, serif" font-size="42" font-weight="700" fill="#c9a84c" letter-spacing=".8">Mission</text>
  </g>

  <g fill="#c5cfdb" font-family="system-ui, sans-serif" font-size="18" font-weight="600" letter-spacing="2.4">
