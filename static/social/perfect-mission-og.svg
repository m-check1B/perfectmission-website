<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Perfect Mission social preview</title>
  <desc id="desc">Perfect Mission social card with a stylized market atlas and the tagline AI-driven real estate consultancy for emerging markets.</desc>
  <defs>
    <linearGradient id="bg" x1="122" x2="1064" y1="38" y2="592" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#162438"/>
      <stop offset=".55" stop-color="#0a1628"/>
      <stop offset="1" stop-color="#07101b"/>
    </linearGradient>
    <radialGradient id="goldGlow" cx="0" cy="0" r="1" gradientTransform="translate(292 154) rotate(65.3) scale(420 420)" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#c9a84c" stop-opacity=".34"/>
      <stop offset="1" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blueGlow" cx="0" cy="0" r="1" gradientTransform="translate(920 104) rotate(135.2) scale(360 360)" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3a5068" stop-opacity=".54"/>
      <stop offset="1" stop-color="#3a5068" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="54" height="54" patternUnits="userSpaceOnUse">
      <path d="M54 0H0V54" fill="none" stroke="#e2e0db" stroke-opacity=".08" stroke-width="1"/>
    </pattern>
    <linearGradient id="network" x1="706" x2="1074" y1="180" y2="470" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#e8d48b"/>
      <stop offset=".55" stop-color="#c9a84c"/>
      <stop offset="1" stop-color="#d4943a"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" rx="28" fill="url(#bg)"/>
  <rect width="1200" height="630" rx="28" fill="url(#goldGlow)"/>
  <rect width="1200" height="630" rx="28" fill="url(#blueGlow)"/>
  <rect width="1200" height="630" rx="28" fill="url(#grid)"/>
  <rect x="34" y="34" width="1132" height="562" rx="24" fill="none" stroke="#e8d48b" stroke-opacity=".32" stroke-width="1.5"/>

  <g fill="#f8f6f1">
